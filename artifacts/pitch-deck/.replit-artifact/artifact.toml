kind = "slides"
previewPath = "/pitch-deck/"
title = "Receipt Tracker Pitch Deck"
version = "1.0.0"
id = "artifacts/pitch-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pitch-deck/" ]
localPort = 18522

[services.development]
run = "pnpm --filter @workspace/pitch-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pitch-deck", "run", "build" ]
publicDir = "artifacts/pitch-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18522"
BASE_PATH = "/pitch-deck/"
