kind = "mobile"
previewPath = "/"
title = "Receipt Tracker"
version = "1.0.0"
id = "artifacts/receipt-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18922

[services.development]
run = "pnpm --filter @workspace/receipt-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/receipt-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/receipt-tracker", "run", "serve" ]

[services.env]
PORT = "18922"
BASE_PATH = "/"
