kind = "video"
previewPath = "/showcase-video/"
title = "Receipt Tracker Showcase"
version = "1.0.0"
id = "artifacts/showcase-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/showcase-video/" ]
localPort = 22282

[services.development]
run = "pnpm --filter @workspace/showcase-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/showcase-video", "run", "build" ]
publicDir = "artifacts/showcase-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22282"
BASE_PATH = "/showcase-video/"
