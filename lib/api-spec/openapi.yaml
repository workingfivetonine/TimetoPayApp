      type: object
      required: [date, total, receiptCount, receiptIds]
      properties:
        date:
          type: string
          description: ISO date string YYYY-MM-DD
        total:
          type: number
        receiptCount:
          type: integer
        receiptIds:
          type: array
          items:
            type: integer

    ParseReceiptInput:
      type: object
      required: [imageBase64]
      properties:
        imageBase64:
          type: string

    ParsePdfInput:
      type: object
      required: [pdfBase64]
      properties:
        pdfBase64:
          type: string

    ReceiptBounds:
      type: object
      required: [x, y, width, height]
      properties:
        x:
          type: number
          description: Left edge as fraction of image width (0–1)
        y:
          type: number
          description: Top edge as fraction of image height (0–1)
        width:
          type: number
          description: Width as fraction of image width (0–1)
        height:
          type: number
          description: Height as fraction of image height (0–1)
