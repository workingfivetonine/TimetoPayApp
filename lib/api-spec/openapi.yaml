openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Receipt Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stores
    description: Store management
  - name: items
    description: Item management
  - name: receipts
    description: Receipt management
  - name: analytics
    description: Analytics and insights
  - name: shopping-list
    description: Shopping list generation
  - name: receipts-ai
    description: AI receipt parsing
  - name: admin
    description: Admin cross-user views
  - name: users
    description: Current user

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stores:
    get:
      operationId: listStores
      tags: [stores]
      summary: List all stores
      responses:
        "200":
          description: List of stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreInput"
      responses:
        "201":
          description: Created store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{id}:
    get:
      operationId: getStore
      tags: [stores]
      summary: Get a store by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: Not found
    patch:
      operationId: updateStore
      tags: [stores]
      summary: Update a store
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreUpdate"
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    delete:
      operationId: deleteStore
      tags: [stores]
      summary: Delete a store
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List all items
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      operationId: createItem
      tags: [items]
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /items/{id}/ran-out:
    post:
      operationId: markRanOut
      tags: [items]
      summary: Mark an item as ran out, recording the current timestamp
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ran-out recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RanOutResponse"
        "404":
          description: Item not found

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get an item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found
    patch:
      operationId: updateItem
      tags: [items]
      summary: Update an item (name, notes)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /receipts:
    get:
      operationId: listReceipts
      tags: [receipts]
      summary: List all receipts
      responses:
        "200":
          description: List of receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receipt"
    post:
      operationId: createReceipt
      tags: [receipts]
      summary: Create a receipt manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptInput"
      responses:
        "201":
          description: Created receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"

  /receipts/{id}:
    get:
      operationId: getReceipt
      tags: [receipts]
      summary: Get a receipt by ID with line items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt with line items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteReceipt
      tags: [receipts]
      summary: Delete a receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /receipts/{id}/line-items:
    post:
      operationId: addLineItem
      tags: [receipts]
      summary: Add a line item to a receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LineItemInput"
      responses:
        "201":
          description: Created line item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineItem"

  /line-items/{id}:
    patch:
      operationId: updateLineItem
      tags: [receipts]
      summary: Update a line item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LineItemUpdate"
      responses:
        "200":
          description: Updated line item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineItem"
    delete:
      operationId: deleteLineItem
      tags: [receipts]
      summary: Delete a line item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /analytics/daily-spend:
    get:
      operationId: getDailySpend
      tags: [analytics]
      summary: Daily spend totals for calendar view
      responses:
        "200":
          description: Daily spend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DaySpend"

  /analytics/spend:
    get:
      operationId: getSpendAnalytics
      tags: [analytics]
      summary: Weekly spend totals with trend info (high/low flags)
      responses:
        "200":
          description: Weekly spend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendAnalytics"

  /analytics/items/{id}/price-history:
    get:
      operationId: getItemPriceHistory
      tags: [analytics]
      summary: Price history for an item across stores and time
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemPriceHistory"

  /analytics/stores/{id}/visits:
    get:
      operationId: getStoreVisits
      tags: [analytics]
      summary: All visits to a store with items purchased per visit, plus unique items list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store visits report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreVisitsReport"

  /analytics/items/{id}/history:
    get:
      operationId: getItemHistory
      tags: [analytics]
      summary: Full purchase history for a single item across all stores and dates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item purchase history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemHistoryReport"

  /analytics/stores/{id}/summary:
    get:
      operationId: getStoreSummary
      tags: [analytics]
      summary: Summary stats for a store including avg spend, top items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSummary"

  /shopping-list:
    get:
      operationId: getShoppingList
      tags: [shopping-list]
      summary: Get auto-generated shopping list from purchase history
      responses:
        "200":
          description: Shopping list with recurring and one-off items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingList"

  /receipts/parse:
    post:
      operationId: parseReceiptImage
      tags: [receipts-ai]
      summary: Parse a receipt image using AI and return extracted data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseReceiptInput"
      responses:
        "200":
          description: Parsed receipt data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedReceipt"

  /receipts/parse-and-save:
    post:
      operationId: parseAndSaveReceipt
      tags: [receipts-ai]
      summary: Parse a receipt image and save it (store + items + line items)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseReceiptInput"
      responses:
        "201":
          description: Saved receipt with all data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"

  /receipts/save-parsed:
    post:
      operationId: saveParsedReceipt
      tags: [receipts-ai]
      summary: Save an already-parsed (and user-corrected) receipt to the database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParsedReceipt"
      responses:
        "201":
          description: Saved receipt with all data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"

  /receipts/manual-entry:
    post:
      operationId: manualEntryReceipt
      tags: [receipts-ai]
      summary: Manually enter a receipt with store info and line items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualEntryInput"
      responses:
        "201":
          description: Saved receipt with all data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"

  /receipts/detect-bounds:
    post:
      operationId: detectReceiptBounds
      tags: [receipts-ai]
      summary: Use AI to detect the bounding box of a receipt in a photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseReceiptInput"
      responses:
        "200":
          description: Bounding box as fractions (0–1) of the image dimensions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptBounds"

  /receipts/parse-pdf:
    post:
      operationId: parsePdfReceipt
      tags: [receipts-ai]
      summary: Parse a PDF receipt (online order confirmation) and save it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParsePdfInput"
      responses:
        "201":
          description: Saved receipt with all data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"

  /me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users with a summary of their data (admin only)
      responses:
        "200":
          description: List of users with per-user data summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/receipts:
    get:
      operationId: adminGetUserReceipts
      tags: [admin]
      summary: Get a specific user's receipts (admin only, read-only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The user's receipts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserReceipts"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    CurrentUser:
      type: object
      required: [id, isAdmin]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        isAdmin:
          type: boolean

    AdminUser:
      type: object
      required: [id, isAdmin, createdAt, storeCount, itemCount, receiptCount, totalSpend]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        isAdmin:
          type: boolean
        createdAt:
          type: string
        storeCount:
          type: integer
        itemCount:
          type: integer
        receiptCount:
          type: integer
        totalSpend:
          type: number

    AdminReceiptSummary:
      type: object
      required: [id, storeName, total, purchasedAt, createdAt]
      properties:
        id:
          type: integer
        storeName:
          type: string
        total:
          type: number
        purchasedAt:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    AdminUserReceipts:
      type: object
      required: [userId, receipts]
      properties:
        userId:
          type: string
        email:
          type: ["string", "null"]
        receipts:
          type: array
          items:
            $ref: "#/components/schemas/AdminReceiptSummary"

    Store:
      type: object
      required: [id, name, deliveryAvailable, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        openTimes:
          type: ["string", "null"]
        deliveryAvailable:
          type: boolean
        deliveryFee:
          type: ["number", "null"]
        minimumOrderAmount:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    StoreInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        openTimes:
          type: ["string", "null"]
        deliveryAvailable:
          type: boolean
        deliveryFee:
          type: ["number", "null"]
        minimumOrderAmount:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]

    StoreUpdate:
      type: object
      properties:
        name:
          type: string
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        openTimes:
          type: ["string", "null"]
        deliveryAvailable:
          type: boolean
        deliveryFee:
          type: ["number", "null"]
        minimumOrderAmount:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]

    Item:
      type: object
      required: [id, name, purchaseCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: ["string", "null"]
          description: Emoji icon representing the item
        notes:
          type: ["string", "null"]
        purchaseCount:
          type: integer
        createdAt:
          type: string

    ItemInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        icon:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    ItemUpdate:
      type: object
      properties:
        name:
          type: string
        icon:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    Receipt:
      type: object
      required: [id, storeId, storeName, purchasedAt, total, createdAt]
      properties:
        id:
          type: integer
        storeId:
          type: integer
        storeName:
          type: string
        purchasedAt:
          type: string
        total:
          type: number
        totalBeforeTax:
          type: ["number", "null"]
        imageUri:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    ReceiptInput:
      type: object
      required: [storeId, purchasedAt, total]
      properties:
        storeId:
          type: integer
        purchasedAt:
          type: string
        total:
          type: number
        imageUri:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    LineItem:
      type: object
      required: [id, receiptId, itemId, itemName, price, quantity, createdAt]
      properties:
        id:
          type: integer
        receiptId:
          type: integer
        itemId:
          type: integer
        itemName:
          type: string
        icon:
          type: ["string", "null"]
        price:
          type: number
        quantity:
          type: number
        createdAt:
          type: string

    LineItemInput:
      type: object
      required: [itemId, price, quantity]
      properties:
        itemId:
          type: integer
        price:
          type: number
        quantity:
          type: number

    LineItemUpdate:
      type: object
      properties:
        price:
          type: number
        quantity:
          type: number

    ReceiptDetail:
      type: object
      required: [id, storeId, storeName, purchasedAt, total, lineItems, createdAt]
      properties:
        id:
          type: integer
        storeId:
          type: integer
        storeName:
          type: string
        purchasedAt:
          type: string
        total:
          type: number
        totalBeforeTax:
          type: ["number", "null"]
        imageUri:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItem"
        createdAt:
          type: string

    ManualEntryInput:
      type: object
      required: [storeName, purchasedAt, total, lineItems]
      properties:
        storeName:
          type: string
        storeAddress:
          type: ["string", "null"]
        storePhone:
          type: ["string", "null"]
        storeOpenTimes:
          type: ["string", "null"]
        purchasedAt:
          type: string
          description: ISO 8601 date-time string
        total:
          type: number
          description: Total after tax
        totalBeforeTax:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        lineItems:
          type: array
          items:
            type: object
            required: [name, price, quantity]
            properties:
              name:
                type: string
              price:
                type: number
              quantity:
                type: number

    StoreVisitItem:
      type: object
      required: [itemName, price, quantity]
      properties:
        itemName:
          type: string
        price:
          type: number
        quantity:
          type: number

    StoreVisit:
      type: object
      required: [receiptId, purchasedAt, items]
      properties:
        receiptId:
          type: integer
        purchasedAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/StoreVisitItem"

    StoreVisitsReport:
      type: object
      required: [storeId, storeName, visits, uniqueItems]
      properties:
        storeId:
          type: integer
        storeName:
          type: string
        visits:
          type: array
          items:
            $ref: "#/components/schemas/StoreVisit"
        uniqueItems:
          type: array
          items:
            type: string

    ItemHistoryEntry:
      type: object
      required: [receiptId, purchasedAt, storeName, price, quantity]
      properties:
        receiptId:
          type: integer
        purchasedAt:
          type: string
        storeName:
          type: string
        price:
          type: number
        quantity:
          type: number

    ItemHistoryReport:
      type: object
      required: [itemId, itemName, purchaseCount, averagePrice, lowestPrice, highestPrice, history]
      properties:
        itemId:
          type: integer
        itemName:
          type: string
        icon:
          type: ["string", "null"]
        purchaseCount:
          type: integer
        averagePrice:
          type: number
        lowestPrice:
          type: number
        highestPrice:
          type: number
        daysSinceLastPurchase:
          type: ["integer", "null"]
        lastPurchasedAt:
          type: ["string", "null"]
        ranOutAt:
          type: ["string", "null"]
        history:
          type: array
          items:
            $ref: "#/components/schemas/ItemHistoryEntry"

    RanOutResponse:
      type: object
      required: [ranOutAt]
      properties:
        ranOutAt:
          type: string
        daysSinceLastPurchase:
          type: ["integer", "null"]

    WeeklySpend:
      type: object
      required: [weekStart, weekEnd, total, isHigh, isLow]
      properties:
        weekStart:
          type: string
        weekEnd:
          type: string
        total:
          type: number
        isHigh:
          type: boolean
        isLow:
          type: boolean
        receiptCount:
          type: integer

    SpendAnalytics:
      type: object
      required: [weeks, average, totalSpend, weeklyAverage]
      properties:
        weeks:
          type: array
          items:
            $ref: "#/components/schemas/WeeklySpend"
        average:
          type: number
        totalSpend:
          type: number
        weeklyAverage:
          type: number

    PricePoint:
      type: object
      required: [date, price, storeId, storeName, receiptId]
      properties:
        date:
          type: string
        price:
          type: number
        storeId:
          type: integer
        storeName:
          type: string
        receiptId:
          type: integer

    ItemPriceHistory:
      type: object
      required: [itemId, itemName, averagePrice, lowestPrice, highestPrice, lowestPriceStoreName, pricePoints]
      properties:
        itemId:
          type: integer
        itemName:
          type: string
        icon:
          type: ["string", "null"]
        averagePrice:
          type: number
        lowestPrice:
          type: number
        highestPrice:
          type: number
        lowestPriceStoreName:
          type: string
        pricePoints:
          type: array
          items:
            $ref: "#/components/schemas/PricePoint"

    StoreSummary:
      type: object
      required: [storeId, storeName, receiptCount, totalSpend, averageReceiptTotal, deliveryAvailable]
      properties:
        storeId:
          type: integer
        storeName:
          type: string
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        openTimes:
          type: ["string", "null"]
        receiptCount:
          type: integer
        totalSpend:
          type: number
        averageReceiptTotal:
          type: number
        deliveryAvailable:
          type: boolean
        deliveryFee:
          type: ["number", "null"]
        minimumOrderAmount:
          type: ["number", "null"]
        deliveryCostBenefitNote:
          type: ["string", "null"]

    ShoppingListItem:
      type: object
      required: [itemId, itemName, purchaseCount, averagePrice, lowestPrice, lowestPriceStoreName, isRecurring]
      properties:
        itemId:
          type: integer
        itemName:
          type: string
        icon:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        purchaseCount:
          type: integer
        averagePrice:
          type: number
        lowestPrice:
          type: number
        lowestPriceStoreName:
          type: string
        isRecurring:
          type: boolean
        daysSinceLastPurchase:
          type: ["integer", "null"]
        lastPurchasedAt:
          type: ["string", "null"]
        ranOutAt:
          type: ["string", "null"]

    ShoppingList:
      type: object
      required: [recurring, oneOff]
      properties:
        recurring:
          type: array
          items:
            $ref: "#/components/schemas/ShoppingListItem"
        oneOff:
          type: array
          items:
            $ref: "#/components/schemas/ShoppingListItem"

    ParsedReceiptLineItem:
      type: object
      required: [name, price, quantity]
      properties:
        name:
          type: string
        icon:
          type: ["string", "null"]
        price:
          type: number
        quantity:
          type: number
        nameUncertain:
          type: boolean
        priceUncertain:
          type: boolean

    ParsedReceipt:
      type: object
      required: [storeName, purchasedAt, total, lineItems]
      properties:
        storeName:
          type: string
        storeNameUncertain:
          type: boolean
        purchasedAt:
          type: string
        dateUncertain:
          type: boolean
        total:
          type: number
        totalUncertain:
          type: boolean
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/ParsedReceiptLineItem"

    DaySpend:
      type: object
      required: [date, total, receiptCount]
      properties:
        date:
          type: string
          description: ISO date string YYYY-MM-DD
        total:
          type: number
        receiptCount:
          type: integer

    ParseReceiptInput:
      type: object
      required: [imageBase64]
      properties:
        imageBase64:
          type: string

    ParsePdfInput:
      type: object
      required: [pdfBase64]
      properties:
        pdfBase64:
          type: string

    ReceiptBounds:
      type: object
      required: [x, y, width, height]
      properties:
        x:
          type: number
          description: Left edge as fraction of image width (0–1)
        y:
          type: number
          description: Top edge as fraction of image height (0–1)
        width:
          type: number
          description: Width as fraction of image width (0–1)
        height:
          type: number
          description: Height as fraction of image height (0–1)
