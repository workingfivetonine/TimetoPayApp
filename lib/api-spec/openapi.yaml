openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Receipt Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stores
    description: Store management
  - name: items
    description: Item management
  - name: receipts
    description: Receipt management
  - name: analytics
    description: Analytics and insights
  - name: shopping-list
    description: Shopping list generation
  - name: receipts-ai
    description: AI receipt parsing
  - name: admin
    description: Admin cross-user views
  - name: users
    description: Current user
  - name: billing
    description: Subscription billing (Stripe / PayPal)

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stores:
    get:
      operationId: listStores
      tags: [stores]
      summary: List all stores
      responses:
        "200":
          description: List of stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreInput"
      responses:
        "201":
          description: Created store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{id}:
    get:
      operationId: getStore
      tags: [stores]
      summary: Get a store by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: Not found
    patch:
      operationId: updateStore
      tags: [stores]
      summary: Update a store
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreUpdate"
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    delete:
      operationId: deleteStore
      tags: [stores]
      summary: Delete a store
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List all items
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      operationId: createItem
      tags: [items]
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /items/{id}/ran-out:
    post:
      operationId: markRanOut
      tags: [items]
      summary: Mark an item as ran out, recording the current timestamp
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ran-out recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RanOutResponse"
        "404":
          description: Item not found

  /items/{id}/dismiss:
    post:
      operationId: dismissItem
      tags: [items]
      summary: Dismiss an item from the shopping list until it is purchased or runs out again
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissal recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DismissResponse"
        "404":
          description: Item not found

  /items/{id}/merge:
    post:
      operationId: mergeItem
      tags: [items]
      summary: Merge this item into another item (reassigns purchase history, deletes this item)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergeItemInput"
      responses:
        "200":
          description: Merged item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Item not found

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get an item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found
    patch:
      operationId: updateItem
      tags: [items]
      summary: Update an item (name, notes)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /receipts:
    get:
      operationId: listReceipts
      tags: [receipts]
      summary: List all receipts
      responses:
        "200":
          description: List of receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receipt"
    post:
      operationId: createReceipt
      tags: [receipts]
      summary: Create a receipt manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptInput"
      responses:
        "201":
          description: Created receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"

  /receipts/{id}:
    get:
      operationId: getReceipt
      tags: [receipts]
      summary: Get a receipt by ID with line items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt with line items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteReceipt
      tags: [receipts]
      summary: Delete a receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /receipts/{id}/line-items:
    post:
      operationId: addLineItem
      tags: [receipts]
      summary: Add a line item to a receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LineItemInput"
      responses:
        "201":
          description: Created line item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineItem"

  /line-items/{id}:
    patch:
      operationId: updateLineItem
      tags: [receipts]
      summary: Update a line item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LineItemUpdate"
      responses:
        "200":
          description: Updated line item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineItem"
    delete:
      operationId: deleteLineItem
      tags: [receipts]
      summary: Delete a line item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /analytics/daily-spend:
    get:
      operationId: getDailySpend
      tags: [analytics]
      summary: Daily spend totals for calendar view
      responses:
        "200":
          description: Daily spend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DaySpend"

  /analytics/spend:
    get:
      operationId: getSpendAnalytics
      tags: [analytics]
      summary: Weekly spend totals with trend info (high/low flags)
      responses:
        "200":
          description: Weekly spend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendAnalytics"

  /analytics/items/{id}/price-history:
    get:
      operationId: getItemPriceHistory
      tags: [analytics]
      summary: Price history for an item across stores and time
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemPriceHistory"

  /analytics/stores/{id}/visits:
    get:
      operationId: getStoreVisits
      tags: [analytics]
      summary: All visits to a store with items purchased per visit, plus unique items list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store visits report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreVisitsReport"

  /analytics/items/{id}/history:
    get:
      operationId: getItemHistory
      tags: [analytics]
      summary: Full purchase history for a single item across all stores and dates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item purchase history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemHistoryReport"

  /analytics/stores/{id}/summary:
    get:
      operationId: getStoreSummary
      tags: [analytics]
      summary: Summary stats for a store including avg spend, top items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSummary"

  /shopping-list:
    get:
      operationId: getShoppingList
      tags: [shopping-list]
      summary: Get auto-generated shopping list from purchase history
      responses:
        "200":
          description: Shopping list with recurring and one-off items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingList"

  /receipts/parse:
    post:
      operationId: parseReceiptImage
      tags: [receipts-ai]
      summary: Parse a receipt image using AI and return extracted data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseReceiptInput"
      responses:
        "200":
          description: Parsed receipt data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedReceipt"

  /receipts/parse-and-save:
    post:
      operationId: parseAndSaveReceipt
      tags: [receipts-ai]
      summary: Parse a receipt image and save it (store + items + line items)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseReceiptInput"
      responses:
        "201":
          description: Saved receipt with all data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"

  /receipts/save-parsed:
    post:
      operationId: saveParsedReceipt
      tags: [receipts-ai]
      summary: Save an already-parsed (and user-corrected) receipt to the database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParsedReceipt"
      responses:
        "201":
          description: Saved receipt with all data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"

  /receipts/manual-entry:
    post:
      operationId: manualEntryReceipt
      tags: [receipts-ai]
      summary: Manually enter a receipt with store info and line items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualEntryInput"
      responses:
        "201":
          description: Saved receipt with all data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"

  /receipts/detect-bounds:
    post:
      operationId: detectReceiptBounds
      tags: [receipts-ai]
      summary: Use AI to detect the bounding box of a receipt in a photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseReceiptInput"
      responses:
        "200":
          description: Bounding box as fractions (0–1) of the image dimensions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptBounds"

  /receipts/parse-pdf:
    post:
      operationId: parsePdfReceipt
      tags: [receipts-ai]
      summary: Parse a PDF receipt (online order confirmation) and save it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParsePdfInput"
      responses:
        "201":
          description: Saved receipt with all data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"

  /me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /me/region:
    patch:
      operationId: updateMyRegion
      tags: [users]
      summary: Set the authenticated user's region (country, and state for the US)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegionInput"
      responses:
        "200":
          description: The updated current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /billing/checkout:
    post:
      operationId: createBillingCheckout
      tags: [billing]
      summary: Start a subscription checkout with the chosen provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCheckoutInput"
      responses:
        "200":
          description: A provider redirect URL to complete checkout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingCheckoutResponse"
        "400":
          description: Invalid request or provider not configured

  /billing/manage:
    post:
      operationId: manageBillingSubscription
      tags: [billing]
      summary: Get a provider URL to manage or cancel the current subscription
      responses:
        "200":
          description: A provider management/portal URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingManageResponse"
        "404":
          description: No active subscription to manage

  /billing/paypal/finalize:
    post:
      operationId: finalizePaypalSubscription
      tags: [billing]
      summary: Finalize a PayPal subscription after approval (server reads it from PayPal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaypalFinalizeInput"
      responses:
        "200":
          description: The updated current user with refreshed entitlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "400":
          description: Invalid request
        "404":
          description: Subscription not found

  /billing/start-trial:
    post:
      operationId: startFreeTrial
      tags: [billing]
      summary: Start the one-time, no-payment free trial
      responses:
        "200":
          description: The updated current user with refreshed entitlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "400":
          description: A free trial isn't available for this account
        "404":
          description: User not found

  /billing/redeem:
    post:
      operationId: redeemPromoCode
      tags: [billing]
      summary: Redeem a promo code for complimentary full access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemPromoCodeInput"
      responses:
        "200":
          description: The updated current user with refreshed entitlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "400":
          description: Invalid or missing promo code

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users with a summary of their data (admin only)
      responses:
        "200":
          description: List of users with per-user data summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/subscribers:
    get:
      operationId: adminListSubscribers
      tags: [admin]
      summary: List all users with their subscription/entitlement status (admin only)
      responses:
        "200":
          description: List of users with subscription status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSubscriber"

  /admin/users/{userId}/role:
    patch:
      operationId: adminSetUserRole
      tags: [admin]
      summary: Set a user's type/role (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSetRoleInput"
      responses:
        "200":
          description: The updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Invalid request
        "404":
          description: User not found

  /admin/users/merge:
    post:
      operationId: adminMergeUsers
      tags: [admin]
      summary: Merge one user's data into another, then delete the source (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminMergeUsersInput"
      responses:
        "200":
          description: Merge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMergeResult"
        "400":
          description: Invalid request
        "404":
          description: User not found

  /admin/users/{userId}:
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Delete a user and all their data (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActionResult"
        "400":
          description: Invalid request
        "404":
          description: User not found

  /admin/users/{userId}/receipts:
    get:
      operationId: adminGetUserReceipts
      tags: [admin]
      summary: Get a specific user's receipts (admin only, read-only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The user's receipts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserReceipts"

  /catalog/browse:
    get:
      operationId: browseCatalog
      tags: [catalog]
      summary: Browse the global price catalog grouped by category (all users)
      responses:
        "200":
          description: Catalog items grouped by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogBrowse"

  /catalog/add-to-list:
    post:
      operationId: addCatalogItemToList
      tags: [catalog]
      summary: Add a catalog item to the current user's shopping list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogAddToListInput"
      responses:
        "200":
          description: Item added to the shopping list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Catalog item not found

  /admin/catalog/global:
    get:
      operationId: adminGetGlobalPrices
      tags: [admin]
      summary: Global most-recent price per canonical item across all users (admin only)
      responses:
        "200":
          description: Canonical items with overall and per-store most-recent prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogGlobalItem"

  /admin/catalog/items:
    get:
      operationId: adminListCatalogItems
      tags: [admin]
      summary: List canonical catalog items with members and merge suggestions (admin only)
      responses:
        "200":
          description: Canonical items and suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntryList"

  /admin/catalog/stores:
    get:
      operationId: adminListCatalogStores
      tags: [admin]
      summary: List canonical catalog stores with members and merge suggestions (admin only)
      responses:
        "200":
          description: Canonical stores and suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntryList"

  /admin/catalog/items/merge:
    post:
      operationId: adminMergeCatalogItems
      tags: [admin]
      summary: Merge one canonical item into another (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogMergeInput"
      responses:
        "200":
          description: Merge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntry"

  /admin/catalog/stores/merge:
    post:
      operationId: adminMergeCatalogStores
      tags: [admin]
      summary: Merge one canonical store into another (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogMergeInput"
      responses:
        "200":
          description: Merge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntry"

  /admin/catalog/items/{id}:
    patch:
      operationId: adminUpdateCatalogItem
      tags: [admin]
      summary: Rename or re-icon a canonical item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogItemUpdate"
      responses:
        "200":
          description: Updated canonical item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntry"

  /admin/catalog/stores/{id}:
    patch:
      operationId: adminUpdateCatalogStore
      tags: [admin]
      summary: Rename a canonical store (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogStoreUpdate"
      responses:
        "200":
          description: Updated canonical store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntry"

  /admin/catalog/items/{id}/split:
    post:
      operationId: adminSplitCatalogItem
      tags: [admin]
      summary: Split one member name out of a canonical item into its own entry (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogSplitInput"
      responses:
        "200":
          description: The new canonical item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntry"

  /admin/catalog/stores/{id}/split:
    post:
      operationId: adminSplitCatalogStore
      tags: [admin]
      summary: Split one member name out of a canonical store into its own entry (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogSplitInput"
      responses:
        "200":
          description: The new canonical store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogEntry"

  /admin/catalog/items/suggest-categories:
    post:
      operationId: adminSuggestCatalogItemCategories
      tags: [admin]
      summary: AI-suggest a category for catalog items (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogCategorySuggestInput"
      responses:
        "200":
          description: Suggested categories, one per requested item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogCategorySuggestionList"

  /admin/catalog/items/suggest-duplicates:
    post:
      operationId: adminSuggestCatalogItemDuplicates
      tags: [admin]
      summary: AI-find likely duplicate catalog items to merge (admin only)
      responses:
        "200":
          description: Suggested merge groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogSuggestionList"

  /admin/catalog/stores/suggest-duplicates:
    post:
      operationId: adminSuggestCatalogStoreDuplicates
      tags: [admin]
      summary: AI-find likely duplicate catalog stores to merge (admin only)
      responses:
        "200":
          description: Suggested merge groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogSuggestionList"

